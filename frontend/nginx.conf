# Статика SPA + прокси на API. Имя «backend» — сервис в docker-compose / той же сети.
#
# Без resolver + переменной nginx резолвит backend при старте и падает с
# "host not found in upstream", если фронт поднялся раньше или без общей сети с API.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Встроенный DNS Docker (см. /etc/resolv.conf в контейнере)
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Пути FastAPI — резолвинг backend при запросе, не при старте nginx
    location ~ ^/(chat|chat-with-system|chat-json|analyze-site|docs|openapi\.json|redoc) {
        set $backend_host backend;
        proxy_pass http://$backend_host:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
