# =============================================================================
# Production на сервере: образы с Docker Hub (не build локально на сервере).
#
# Перед первым запуском:
#   1) Скопируйте этот каталог на сервер (или клонируйте репозиторий).
#   2) cp .env.example .env и заполните DOCKERHUB_USER, секреты бэкенда.
#   3) docker login (если образы приватные).
#
# Сборка и push образов (на CI или локально, из корня репозитория):
#   docker build -f backend/Dockerfile.prod -t lapiki/backend:latest ./backend
#   docker build -f frontend/Dockerfile.prod -t lapiki/frontend:latest ./frontend
#   docker push lapiki/backend:latest && docker push lapiki/frontend:latest
#
# Запуск:
#   docker compose up -d
#
# Имена/теги меняйте через .env: DOCKERHUB_USER, IMAGE_TAG, CONTAINER_PREFIX, сети, порты.
# =============================================================================

name: postgenerator

services:
  # --- Backend: FastAPI + Uvicorn ---
  backend:
    image: ${DOCKERHUB_USER}/backend:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_PREFIX:-postgen}-backend
    restart: unless-stopped
    env_file:
      # Путь относительно этого docker-compose.yml (каталог deploy/)
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      # Хост:контейнер — смените BACKEND_HOST_PORT при конфликте портов
      - "${BACKEND_HOST_PORT:-8000}:8000"
    networks:
      - app_net

  # --- Frontend: nginx + статика React ---
  frontend:
    image: ${DOCKERHUB_USER}/frontend:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_PREFIX:-postgen}-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Если в Dokploy сервис API не называется «backend» — задайте полный URL (см. deploy/.env.example)
      BACKEND_URL: ${BACKEND_URL:-}
      BACKEND_HOST: ${BACKEND_HOST:-backend}
      BACKEND_PORT: "${BACKEND_PORT:-8000}"
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    networks:
      - app_net

# Общая bridge-сеть: сервисы резолвят друг друга по имени (backend, frontend).
networks:
  app_net:
    driver: bridge
    name: ${NETWORK_NAME:-postgen_app_net}
