# Продакшен: сборка из Dockerfile.prod (nginx + статика, uvicorn без --reload).
# Докploy / сервер: укажите этот файл вместо docker-compose.yml.
#
# Из корня репозитория:
#   cp .env.example .env   # или скопируйте секреты из deploy/.env.example
#   docker compose -f docker-compose-prod.yaml up -d --build
#
# Имена сервисов backend / frontend — DNS в одной сети; для nginx см. BACKEND_URL в .env
# Фронт: expose 80 без host-маппинга — Traefik/Dokploy маршрутизирует по внутренней сети.
# Бэкенд: expose 8000 аналогично. Host-порты задаются через BACKEND_HOST_PORT / FRONTEND_HOST_PORT.

name: postgenerator

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    expose:
      - "8000"
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: ${BACKEND_URL:-}
      BACKEND_HOST: ${BACKEND_HOST:-backend}
      BACKEND_PORT: "${BACKEND_PORT:-8000}"
    expose:
      - "80"
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
    name: ${NETWORK_NAME:-postgen_app_net}
